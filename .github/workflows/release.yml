name: Release

on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.workflow }}
  cancel-in-progress: false

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.33.3

jobs:
  open-release-pr:
    name: Open / update Release PR
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != '' && !startsWith(github.event.head_commit.message, 'release:')
    permissions:
      contents: write
      pull-requests: write
    outputs:
      should-publish: ${{ steps.detect.outputs.should-publish }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Detect pending intents
        id: detect
        run: |
          shopt -s nullglob
          intents=(.changeset/*.md)
          # Strip the README.
          for i in "${!intents[@]}"; do
            if [[ "$(basename "${intents[i]}")" == "README.md" ]]; then
              unset 'intents[i]'
            fi
          done
          if [[ ${#intents[@]} -eq 0 ]]; then
            echo "should-publish=false" >> "$GITHUB_OUTPUT"
            echo "No pending intent files."
          else
            echo "should-publish=true" >> "$GITHUB_OUTPUT"
            printf 'Pending intent files:\n'
            for i in "${intents[@]}"; do echo "  - $i"; done
          fi

      - name: Apply versions
        if: steps.detect.outputs.should-publish == 'true'
        run: pnpm release:version

      - name: Open / update Release PR
        if: steps.detect.outputs.should-publish == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'release: prepare release'
          title: 'release: prepare release'
          body: |
            This PR was opened automatically by the release workflow.

            It applies the pending intent files in `.changeset/`:
            - bumps `package.json` and `Cargo.toml` versions,
            - prepends entries to each affected `CHANGELOG.md`,
            - regenerates `COMPATIBILITY.md`.

            Merging this PR will trigger publishing to npm and crates.io.
          branch: release/prepare
          delete-branch: true
          add-paths: |
            **/package.json
            **/Cargo.toml
            **/CHANGELOG.md
            COMPATIBILITY.md
            .changeset/

  publish:
    name: Publish to npm + crates.io
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, 'release:')
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Read pinned Rust toolchain
        id: toolchain
        run: |
          channel=$(awk -F\" '/channel/ {print $2}' rust-toolchain.toml)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Publish
        env:
          CODAMA_RELEASE_DRY_RUN: 'false'
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
        run: pnpm release:publish
