name: Main

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: 24

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

      - name: Verify generated artifacts are up to date
        run: |
          pnpm generate
          if ! git diff --quiet -- spec-v1.json; then
            echo '::error::Generated artifacts are stale. Re-run `pnpm generate` and commit the result.'
            git --no-pager diff -- spec-v1.json
            exit 1
          fi

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Open Version Packages PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'Release package'
          title: 'Release package'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
