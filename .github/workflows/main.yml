name: Main

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: main-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: 20
  PNPM_VERSION: 10.33.3

jobs:
  js:
    name: JavaScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm build

      - run: pnpm test

      - name: Verify generated artifacts are up to date
        run: |
          pnpm generate
          if ! git diff --quiet -- spec-v1.json js/node-types/src/generated; then
            echo '::error::Generated artifacts are stale. Re-run `pnpm generate` and commit the result.'
            git --no-pager diff -- spec-v1.json js/node-types/src/generated
            exit 1
          fi

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read pinned Rust toolchain
        id: toolchain
        run: |
          channel=$(awk -F\" '/channel/ {print $2}' rust-toolchain.toml)
          echo "channel=$channel" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt --all -- --check

      - run: cargo clippy --workspace --all-targets -- -D warnings

      - run: cargo build --workspace --all-targets

      - run: cargo test --workspace

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [js, rust]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      # Build before publishing so the dist artifacts are present in the
      # workspace when `changeset publish` runs.
      - run: pnpm build

      - name: Open Version Packages PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: 'release: version packages'
          title: 'release: version packages'
        env:
          # No NPM_TOKEN: this repo uses npm trusted publishing (OIDC).
          # `id-token: write` above lets pnpm exchange a GitHub OIDC token
          # for a short-lived publish token at `pnpm publish` time.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
